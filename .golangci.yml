run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    # Default linters.
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Formatting (kept clean in this repo).
    - gofmt
    - goimports

linters-settings:
  goimports:
    local-prefixes: github.com/Townk/ai-playbook

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
