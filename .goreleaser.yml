# GoReleaser configuration (v2 schema).
# Docs: https://goreleaser.com
version: 2

project_name: ai-playbook

# No `go mod tidy` hook: CI enforces tidiness explicitly (`go mod tidy -diff`),
# so a release build never rewrites go.mod behind the tag's back.

builds:
  - id: ai-playbook
    main: ./cmd/ai-playbook
    binary: ai-playbook
    env:
      - CGO_ENABLED=0
    # Unix-only: the shell driver uses x/sys/unix (PTY, signals, TIOCGPGRP),
    # which does not build on Windows. This is a terminal/zsh-native tool.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X github.com/Townk/ai-playbook/internal/cli.Version={{ .Version }}

  - id: apb
    main: ./cmd/apb
    binary: apb
    env:
      - CGO_ENABLED=0
    # Unix-only: the shell driver uses x/sys/unix (PTY, signals, TIOCGPGRP),
    # which does not build on Windows. This is a terminal/zsh-native tool.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X github.com/Townk/ai-playbook/internal/cli.Version={{ .Version }}

  - id: ask
    main: ./cmd/ask
    binary: ask
    env:
      - CGO_ENABLED=0
    # Unix-only: the widgets run through bubbletea's /dev/tty handling, which
    # this repo only exercises on Unix. This is a terminal/zsh-native tool.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X github.com/Townk/ai-playbook/internal/askcli.Version={{ .Version }}

archives:
  - id: ai-playbook
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - docs/man/*.1
      - completions/_ai-playbook
      - completions/_ask
      - skills/playbook-authoring/SKILL.md
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

# Homebrew tap: on release, a formula is generated from the archives and pushed
# to Townk/homebrew-tap (Formula/ai-playbook.rb) → `brew install
# townk/tap/ai-playbook`.
#
# Deliberately `brews` (a formula), not the newer `homebrew_casks` goreleaser
# nudges toward: casks are macOS-only, while this formula serves the linux
# archives to Homebrew-on-Linux too. Revisit only if goreleaser removes brews.
#
# Publishing is SELF-ARMING: release.yml always exports
# HOMEBREW_TAP_TOKEN (a PAT with push access to the tap repo); while the secret
# is unset/empty the formula is only generated into dist/ (skip_upload), so a
# release never fails on a missing tap. Create the tap repo + secret to arm it.
brews:
  - name: ai-playbook
    ids: [ai-playbook]
    repository:
      owner: Townk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/Townk/ai-playbook
    description: "Terminal-native AI assistant that turns live shell context into runnable, reusable playbooks"
    license: Apache-2.0
    skip_upload: "{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}"
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    install: |
      bin.install "ai-playbook"
      bin.install "apb"
      bin.install "ask"
      man1.install Dir["docs/man/*.1"]
      zsh_completion.install "completions/_ai-playbook"
      zsh_completion.install "completions/_ask"
    test: |
      assert_match version.to_s, shell_output("#{bin}/ai-playbook version")

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: Townk
    name: ai-playbook
  draft: false
  prerelease: auto
