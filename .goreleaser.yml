# GoReleaser configuration (v2 schema).
# Docs: https://goreleaser.com
version: 2

project_name: ai-playbook

before:
  hooks:
    - go mod tidy

builds:
  - id: ai-playbook
    main: ./cmd/ai-playbook
    binary: ai-playbook
    env:
      - CGO_ENABLED=0
    # Unix-only: the shell driver uses x/sys/unix (PTY, signals, TIOCGPGRP),
    # which does not build on Windows. This is a terminal/zsh-native tool.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X github.com/Townk/ai-playbook/internal/cli.Version={{ .Version }}

  - id: apb
    main: ./cmd/apb
    binary: apb
    env:
      - CGO_ENABLED=0
    # Unix-only: the shell driver uses x/sys/unix (PTY, signals, TIOCGPGRP),
    # which does not build on Windows. This is a terminal/zsh-native tool.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X github.com/Townk/ai-playbook/internal/cli.Version={{ .Version }}

archives:
  - id: ai-playbook
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - docs/man/*.1
      - completions/_ai-playbook
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: Townk
    name: ai-playbook
  draft: false
  prerelease: auto
