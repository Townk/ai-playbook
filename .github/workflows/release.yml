name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: build / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install zsh (the shell driver and its tests spawn a zsh shell)
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -timeout 15m ./...

  goreleaser:
    name: goreleaser
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Extract release notes from CHANGELOG
        # Pull the tag's own section out of CHANGELOG.md so the GitHub release
        # shows the hand-curated notes rather than goreleaser's raw commit list.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="## [$VERSION]" 'index($0,ver)==1{f=1;next} f&&/^## \[/{exit} f{print}' CHANGELOG.md \
            | sed '/./,$!d' > "${{ runner.temp }}/release-notes.md"
          # Guard: an empty notes file means the tag has no CHANGELOG section
          # (typo'd version, or the release ritual skipped the rename) — fail
          # the release instead of publishing with blank notes.
          if [ ! -s "${{ runner.temp }}/release-notes.md" ]; then
            echo "::error::CHANGELOG.md has no section for $VERSION — release notes would be empty"
            exit 1
          fi
          echo "--- release notes for $VERSION ---"
          cat "${{ runner.temp }}/release-notes.md"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --release-notes=${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
