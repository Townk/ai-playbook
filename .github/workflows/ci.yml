name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-test:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install zsh (the shell driver and its tests spawn a zsh shell)
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race + coverage)
        # -timeout 25m: the internal/ui suite is subprocess-heavy and exceeds go
        # test's default 10-min per-package timeout on the 2-core CI runner.
        run: go test -race -timeout 25m -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        # Run via `make lint` (go run …golangci-lint@<ver>) so the linter is built
        # with the repo's Go toolchain (go.mod) and can analyze newer-Go code. The
        # prebuilt action binary is built with an older Go and errors out otherwise.
        # Bonus: keeps CI identical to the local `make lint` gate.
        run: make lint
