name: Race

# The race detector runs on a schedule (and on demand), NOT on every push: the
# subprocess-heavy internal/ui suite under -race on 2-core runners takes ~15m,
# too slow for per-push feedback. The fast per-push lane (build/vet/lint/test)
# lives in ci.yml; this lane keeps race coverage without gating every commit.
on:
  schedule:
    - cron: "0 7 * * *" # daily at 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  race:
    name: test (race)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install zsh (the shell driver and its tests spawn a zsh shell)
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Test (race)
        # -timeout 25m: the internal/ui suite is subprocess-heavy and exceeds go
        # test's default 10-min per-package timeout on the 2-core CI runner.
        run: go test -race -timeout 25m ./...
